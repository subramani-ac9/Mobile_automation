# pytest.ini

[pytest]
minversion = 6.0
addopts = -ra -q --tb=short -v
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Add current directory to Python path for imports
pythonpath = .

markers =
    # Login related markers
    login: mark tests related to login functionality
    field_persistence: mark tests that validate field persistence after login error 
    case_sensitivity: mark tests that validate email case sensitivity
    invalid_password_multiple_attempts: mark tests that validate invalid password multiple attempts
    rapid_login_attempts: mark tests that validate rapid login attempts
    email_length_boundaries: mark tests that validate email length boundaries
    test_successful_login: mark tests that validate successful login
    resource: mark tests related to resource functionality
    participant_transfer : mark tests related to participant transfer functionality

    # Poster creation related markers
    poster_creation: tests for poster creation
    poster_download: tests for poster download
    poster_share: tests for poster sharing
    poster_delete: tests for poster deletion

    # Search course related markers
    search_course: mark tests related to search course functionality
    # Test categorization markers
    regression: mark tests that are part of the regression suite
    smoke: mark smoke tests for quick validation
    sanity: mark basic sanity tests to ensure app stability
    critical: mark critical tests that must always pass
    ci: mark tests that should be executed in CI pipeline
    
    # Platform markers
    ios: mark tests specific to iOS
    android: mark tests specific to Android
    
    # Feature markers
    onboarding: mark tests related to the onboarding flow
    register: mark tests related to user registration functionality
    forgot_password: mark tests related to password reset functionality
    course_create: mark tests related to course creation functionality
    meetup_create: mark tests related to meetup creation functionality
    meetup_details: mark tests related to meetup details validation
    filter: mark tests related to My Events filters
    attendance: mark tests related to attendance marking functionality
    edit: mark tests related to editing courses/meetups
    validation: mark tests related to data validation functionality
    teacher_validation: mark tests that validate teacher availability and eligibility
    test_past_date: mark tests that validate past date error handling

    # Data-driven testing markers
    data_driven: mark tests that use data-driven testing with external data sources
    data_driven_with_status: mark tests that perform data-driven testing and store results to output files
    
    # Quality markers
    security: mark security-related tests (e.g., SQLi/XSS inputs)
    edge_cases: mark edge-case validation tests
    boundary: mark boundary condition tests (lengths, limits)
    performance: mark lightweight performance behavior tests
    accessibility: mark accessibility-focused tests
    network: mark network condition tests (offline, errors)
    localization: mark i18n/l10n-related tests
    business_logic: mark business-logic flow tests
    
    # Test ID markers for tracking individual test cases
    testcase_id: mark tests with specific test case IDs for tracking and reporting

    # Temporary_markers:
    attendees_Negative: mark tests that validate negative values for attendees
    product_Negative: mark tests that validate negative values for product
    validated: mark tests that are validated